app-id: io.github.peak.browser
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '23.08'
command: peak-browser

finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: peak-browser
    buildsystem: simple
    build-commands:
      # Copy the packaged Electron app
      - install -d /app/peak-browser
      - cp -r peak-browser-linux-x64/. /app/peak-browser
      # Fix chrome-sandbox permissions
      - chmod 4755 /app/peak-browser/chrome-sandbox
      # Create launcher script
      - |
        cat > /app/bin/peak-browser << 'EOF'
        #!/bin/bash
        exec zypak-wrapper /app/peak-browser/peak-browser "$@"
        EOF
      - chmod +x /app/bin/peak-browser
      # Install icon
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/io.github.peak.browser.png
      # Install desktop file
      - install -Dm644 io.github.peak.browser.desktop /app/share/applications/io.github.peak.browser.desktop
      # Install AppStream metainfo
      - install -Dm644 io.github.peak.browser.metainfo.xml /app/share/metainfo/io.github.peak.browser.metainfo.xml

    sources:
      - type: archive
        url: https://github.com/heimer-dev/Peak_browser/releases/download/v0.1.0/peak-browser-linux-x64-0.1.0.tar.gz
        sha256: 72bedc58ef4c3e10aa38a03a6aa177032b6d46b150604d222dc96d061e5d78e0
        dest: peak-browser-linux-x64
      - type: file
        url: https://raw.githubusercontent.com/heimer-dev/Peak_browser/v0.1.0/resources/icon.png
        sha256: fc959c3f0a10c1456c9f7aa3ca3e9545df974726e768f4f3dc86cfc78ed6708c
      - type: file
        url: https://raw.githubusercontent.com/heimer-dev/Peak_browser/v0.1.0/io.github.peak.browser.desktop
        sha256: 5e21e740f00167185da27424f25dada425c01c6db523cf7bb0dc76ae75438df1
      - type: file
        url: https://raw.githubusercontent.com/heimer-dev/Peak_browser/v0.1.0/io.github.peak.browser.metainfo.xml
        sha256: 98262bc758a168bc37b9a17bbd9227b11bfbd5b246cf6d641720b50213740d88
