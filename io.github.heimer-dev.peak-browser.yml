app-id: io.github.heimer-dev.peak-browser
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
command: peak-browser

finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: peak-browser
    buildsystem: simple
    build-commands:
      - install -d /app/peak-browser
      - cp -r peak-browser-linux-x64/. /app/peak-browser
      - chmod 4755 /app/peak-browser/chrome-sandbox
      - |
        cat > /app/bin/peak-browser << 'EOF'
        #!/bin/bash
        exec zypak-wrapper /app/peak-browser/peak-browser "$@"
        EOF
      - chmod +x /app/bin/peak-browser
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/io.github.heimer-dev.peak-browser.png
      - install -Dm644 io.github.heimer-dev.peak-browser.desktop /app/share/applications/io.github.heimer-dev.peak-browser.desktop
      - install -Dm644 io.github.heimer-dev.peak-browser.metainfo.xml /app/share/metainfo/io.github.heimer-dev.peak-browser.metainfo.xml

    sources:
      - type: archive
        url: https://github.com/heimer-dev/Peak_browser/releases/download/v0.1.0/peak-browser-linux-x64-0.1.0.tar.gz
        sha256: 72bedc58ef4c3e10aa38a03a6aa177032b6d46b150604d222dc96d061e5d78e0
        dest: peak-browser-linux-x64
      - type: file
        url: https://raw.githubusercontent.com/heimer-dev/Peak_browser/v0.1.0/resources/icon.png
        sha256: fc959c3f0a10c1456c9f7aa3ca3e9545df974726e768f4f3dc86cfc78ed6708c
      - type: file
        url: https://raw.githubusercontent.com/heimer-dev/Peak_browser/v0.1.0/io.github.heimer-dev.peak-browser.desktop
        sha256: 10673020f6a91d0619e864734c0dfc54ec96c01d68ca7d1e6147d6db82b0e168
      - type: file
        url: https://raw.githubusercontent.com/heimer-dev/Peak_browser/v0.1.0/io.github.heimer-dev.peak-browser.metainfo.xml
        sha256: ef9cfe85f256daafa0fcdfc5ad11f92a6681bd99e182ff1cc260273a620fadcc
